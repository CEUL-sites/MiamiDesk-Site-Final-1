[build]
  command = "bash scripts/fetch-videos.sh && yarn build"
  publish = "dist"
  functions = "netlify/functions"

# ── Scheduled weekly market feed refresh ───────────────────────────────────
[functions."refresh-market-feed"]
  schedule = "@weekly"

# ── Daily seller nurture sequence (Resend drip from Blobs queue) ───────────
[functions."seller-nurture"]
  schedule = "@daily"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

[context.production.environment]
  NODE_VERSION = "22"

# ── Canonical redirect: www → non-www (301 permanent) ──────────────────────
[[redirects]]
  from = "https://www.homesprofessional.com/*"
  to = "https://homesprofessional.com/:splat"
  status = 301
  force = true

# ── Global Desk consolidation — 301 redirects for legacy URLs ──────────────
[[redirects]]
  from = "/spain-desk"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/spain-desk/*"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/miami-mls-international-desk"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/madrid-miami"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/spain-mls-listing"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/es/spain-desk"
  to = "/es/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/es/madrid"
  to = "/markets"
  status = 301
  force = true

[[redirects]]
  from = "/developers-agencies"
  to = "/global-desk"
  status = 301
  force = true

# ── Sell page canonical consolidation (301) ────────────────────────────────
[[redirects]]
  from = "/sell"
  to = "/sell-south-florida"
  status = 301
  force = true

[[redirects]]
  from = "/madrid"
  to = "/markets"
  status = 301
  force = true

# ── Retired per-city market pages → consolidated Markets page (301) ─────────
[[redirects]]
  from = "/market/*"
  to = "/markets"
  status = 301
  force = true

[[redirects]]
  from = "/market"
  to = "/markets"
  status = 301
  force = true

# ── Kill prerendered 404 artifact — redirect direct visits to home ──────────
# react-snap generates dist/404.html as its fallback prerender output.
# Without this redirect, bots visiting /404.html directly would inflate
# GA4 Direct sessions and contaminate landing-page attribution data.
[[redirects]]
  from = "/404.html"
  to = "/"
  status = 301
  force = true

# ── Journal safety net — SPA fallback for not-yet-prerendered posts ────────
# Every legit route is a prerendered file that Netlify serves before these
# rules run. New journal posts are added to reactSnap.include by the daily
# publish flow; if a post ever misses that list, this keeps it rendering
# client-side instead of hard-404ing a live URL.
[[redirects]]
  from = "/journal/*"
  to = "/200.html"
  status = 200

# ── Everything else that isn't a prerendered file is a real 404 ─────────────
# Serves the prerendered NotFoundPage with a true 404 status. The previous
# catch-all (/index.html, status 200) made every unknown URL a soft 404 —
# bots probing /wp-admin and the like received the homepage with HTTP 200.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ── HTTP Security Headers ───────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://connect.facebook.net https://snap.licdn.com https://assets.newestateonly.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://stats.g.doubleclick.net https://assets.newestateonly.com https://*.newestateonly.com https://maps.googleapis.com; frame-src https://*.newestateonly.com; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
