[build]
  command = "yarn build"
  publish = "dist"
  functions = "netlify/functions"

# ── Scheduled weekly market feed refresh ───────────────────────────────────
[functions."refresh-market-feed"]
  schedule = "@weekly"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

[context.production.environment]
  NODE_VERSION = "22"

# ── Canonical redirect: www → non-www (301 permanent) ──────────────────────
[[redirects]]
  from = "https://www.homesprofessional.com/*"
  to = "https://homesprofessional.com/:splat"
  status = 301
  force = true

# ── Global Desk consolidation — 301 redirects for legacy URLs ──────────────
[[redirects]]
  from = "/spain-desk"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/spain-desk/*"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/miami-mls-international-desk"
  to = "/global-desk"
  status = 301
  force = true

[[redirects]]
  from = "/developers-agencies"
  to = "/global-desk"
  status = 301
  force = true

# ── Sell page canonical consolidation (301) ────────────────────────────────
[[redirects]]
  from = "/sell"
  to = "/sell-south-florida"
  status = 301
  force = true

[[redirects]]
  from = "/madrid"
  to = "/markets"
  status = 301
  force = true

# ── Retired per-city market pages → consolidated Markets page (301) ─────────
[[redirects]]
  from = "/market/*"
  to = "/markets"
  status = 301
  force = true

[[redirects]]
  from = "/market"
  to = "/markets"
  status = 301
  force = true

# ── SPA client-side routing ────────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── HTTP Security Headers ───────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://connect.facebook.net https://snap.licdn.com https://assets.newestateonly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://stats.g.doubleclick.net https://assets.newestateonly.com https://*.newestateonly.com; frame-src https://*.newestateonly.com; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
