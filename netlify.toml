[build]
  command = "yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--version"

[context.production.environment]
  NODE_VERSION = "22"

# ── Canonical redirect: www → non-www (301 permanent) ──────────────────────
[[redirects]]
  from = "https://www.homesprofessional.com/*"
  to = "https://homesprofessional.com/:splat"
  status = 301
  force = true

# ── SPA client-side routing ────────────────────────────────────────────────
[[redirects]]
  from = "/sell"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/buy"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/agents"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/spain-desk"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── HTTP Headers ───────────────────────────────────────────────────────────
# Security headers improve Google's site quality signals

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Vite builds hashed asset filenames — safe to cache indefinitely
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Videos cached 30 days
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Images cached 30 days
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML — always revalidate so Googlebot gets fresh content
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# sitemap + robots — short cache so updates propagate fast
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
