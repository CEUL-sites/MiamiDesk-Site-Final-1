<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Raleway:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    width: 1200px; height: 630px; position: relative;
    background: linear-gradient(135deg, #0B1E3F 0%, #0a1628 55%, #102a52 100%);
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 96px;
    font-family: 'Raleway', sans-serif;
  }
  /* subtle gold radial glow upper right */
  .glow {
    position: absolute; top: -200px; right: -150px; width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(176,141,87,0.18) 0%, rgba(176,141,87,0) 65%);
  }
  /* thin gold frame */
  .frame {
    position: absolute; top: 28px; left: 28px; right: 28px; bottom: 28px; border: 1px solid rgba(176,141,87,0.45);
    pointer-events: none;
  }
  .eyebrow {
    font-size: 17px; letter-spacing: 0.34em; text-transform: uppercase;
    color: #B08D57; font-weight: 600; margin-bottom: 28px;
  }
  h1 {
    font-family: 'Playfair Display', serif; font-weight: 500;
    font-size: 64px; line-height: 1.14; color: #F9F7F2; max-width: 900px;
  }
  h1 em { font-style: italic; color: #d8b988; }
  .rule {
    width: 84px; height: 2px; background: #B08D57; margin: 36px 0 30px;
  }
  .meta {
    display: flex; align-items: center;
    font-size: 19px; color: rgba(249,247,242,0.78); letter-spacing: 0.02em;
  }
  .meta .dot { color: rgba(176,141,87,0.8); margin: 0 22px; }
  .meta strong { color: #F9F7F2; font-weight: 600; }
  .stats span { margin-right: 56px; }
  .stats {
    position: absolute; bottom: 64px; left: 96px; right: 96px;
    display: flex;
    font-size: 15px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(176,141,87,0.95); font-weight: 500;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="frame"></div>
    <div class="eyebrow">HomesProfessional.com</div>
    <h1>South Florida Real Estate,<br><em>Strategically Marketed</em></h1>
    <div class="rule"></div>
    <div class="meta">
      <span><strong>Carlos Uzcategui</strong> · REALTOR® FL SL705771</span>
      <span class="dot">·</span>
      <span>United Realty Group</span>
    </div>
    <div class="stats">
      <span>93,000-Agent MLS Network</span>
      <span>200+ Global Portals</span>
      <span>EN · ES Advisory</span>
    </div>
  </div>
</body>
</html>
