name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      netlify_token:
        description: 'Netlify personal access token (get from app.netlify.com → User Settings → Applications → Personal access tokens). Leave blank to use the NETLIFY_AUTH_TOKEN secret instead.'
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        # Deploy on pushes to main or manual dispatch — uses input token if provided, falls back to secret
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          # Prefer input token (manual dispatch), fall back to repo secret
          TOKEN="${{ inputs.netlify_token }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="${{ secrets.NETLIFY_AUTH_TOKEN }}"
          fi
          if [ -z "$TOKEN" ]; then
            echo "::error title=No Netlify token::Trigger this workflow manually via 'Run workflow' and enter your Netlify token in the input field."
            echo "Get a token at: app.netlify.com → User Settings → Applications → Personal access tokens"
            exit 1
          fi
          # Mask the token so it never appears in logs
          echo "::add-mask::$TOKEN"
          npx netlify-cli deploy \
            --auth "$TOKEN" \
            --site b85e7947-5d72-4bc2-ab4c-82caad1477fb \
            --dir ./dist \
            --no-build \
            --prod \
            --message "Deploy from GitHub Actions — ${{ github.sha }}"
