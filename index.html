<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The page title, meta description, canonical, hreflang and Open Graph tags are
         all set per-route via react-helmet (see src/pages/ and SchemaOrg.tsx) so every
         prerendered page is self-referential. react-snap bakes each route's tags into
         its static HTML file; the template intentionally omits those head tags here to
         avoid duplicating them on every page. -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"></noscript>

    <!-- Open Graph / Twitter card tags are set per-route via react-helmet, with sitewide
         defaults in src/components/SEO/SchemaOrg.tsx (so each page advertises its own URL). -->

    <meta name="theme-color" content="#0a1628" />
    <meta name="geo.region" content="US-FL" />
    <meta name="geo.placename" content="South Florida" />
    <meta name="geo.position" content="26.1009;-80.4031" />
    <meta name="ICBM" content="26.1009, -80.4031" />

    <!-- Structured data (JSON-LD) is injected per-route via react-helmet (src/components/SEO/SchemaOrg.tsx) -->

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-K3CKFM94');</script>
    <!-- End Google Tag Manager -->

    <!-- Meta Pixel -->
    <script>
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
      n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}
      (window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
      fbq('init','1342120122583302');
    </script>
    <!-- End Meta Pixel -->

    <!-- LinkedIn Insight Tag -->
    <script>
      _linkedin_partner_id="537660125";
      window._linkedin_data_partner_ids=window._linkedin_data_partner_ids||[];
      window._linkedin_data_partner_ids.push(_linkedin_partner_id);
      (function(l){if(!l){window.lintrk=function(a,b){window.lintrk.q.push([a,b])};
      window.lintrk.q=[]}var s=document.getElementsByTagName("script")[0];
      var b=document.createElement("script");b.type="text/javascript";b.async=true;
      b.src="https://snap.licdn.com/li.lms-analytics/insight.min.js";
      s.parentNode.insertBefore(b,s)})(window.lintrk);
    </script>
    <!-- End LinkedIn Insight Tag -->
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K3CKFM94" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <!-- Pixel noscript fallbacks (must be in body, not head) -->
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1342120122583302&ev=PageView&noscript=1" /></noscript>
    <noscript><img height="1" width="1" style="display:none" alt="" src="https://px.ads.linkedin.com/collect/?pid=537660125&fmt=gif" /></noscript>
    <!-- Netlify Forms — static declarations required for deploy-time detection -->
    <form name="seller-consultation" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="seller-consultation" />
      <input name="bot-field" /><input name="name" /><input name="email" />
      <input name="phone" /><input name="propertyAddress" /><input name="city" />
      <input name="timeline" /><textarea name="message"></textarea><input name="sourcePage" />
    </form>
    <form name="seller-intake" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="seller-intake" />
      <input name="bot-field" /><input name="name" /><input name="email" />
      <input name="phone" /><input name="propertyAddress" /><input name="city" />
      <input name="valueBand" /><input name="occupancy" /><input name="timeline" />
      <input name="priorListing" /><input name="preferredContact" /><input name="sourcePage" />
    </form>
    <form name="buyer-mandate" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="buyer-mandate" />
      <input name="bot-field" /><input name="name" /><input name="email" />
      <input name="country" /><input name="targetNeighborhoods" /><input name="priceRange" />
      <input name="financing" /><input name="timeline" /><input name="visaStatus" />
      <input name="preferredContact" /><input name="sourcePage" />
    </form>
    <form name="referral-intake" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="referral-intake" />
      <input name="bot-field" /><input name="licenseeName" /><input name="brokerageName" />
      <input name="country" /><input name="referralType" />
      <textarea name="clientSummary"></textarea>
      <input name="preferredContact" /><input name="sourcePage" />
    </form>
    <form name="referral-intake-es" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="referral-intake-es" />
      <input name="bot-field" /><input name="licenseeName" /><input name="brokerageName" />
      <input name="country" /><input name="referralType" />
      <textarea name="clientSummary"></textarea>
      <input name="preferredContact" /><input name="sourcePage" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
