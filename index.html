<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon / app icons. SVG for crisp browser tabs; PNGs for the
         contexts that ignore SVG — iOS home-screen (apple-touch-icon) and the
         Android/Chrome PWA manifest. Regenerate with scripts/render-app-icons.mjs. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#0B1E3F" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- <title>, meta description, canonical, and hreflang alternates are set
         per page by react-helmet-async and baked into every prerendered page
         by react-snap. Static copies here would ship on EVERY page — a
         homepage canonical on every URL is a canonicalization hazard. -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Speed up analytics / pixel handshakes (Core Web Vitals) -->
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="preconnect" href="https://connect.facebook.net">
    <link rel="dns-prefetch" href="https://connect.facebook.net">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"></noscript>

    <!--
      og:title / og:description / og:url / og:image and twitter:card/image
      are set per page via react-helmet-async (and baked in by react-snap).
      Static copies here would come FIRST in <head>, so social scrapers
      would use them instead of the per-page tags — only truly sitewide
      properties belong below.
    -->
    <meta property="og:site_name" content="HomesProfessional.com" />
    <!-- og:locale is set per route by <HtmlLang> (en_US / es_ES) so Spanish
         pages don't advertise en_US. -->
    <meta name="twitter:site" content="@unitedrealty" />

    <meta name="theme-color" content="#0a1628" />
    <meta name="geo.region" content="US-FL" />
    <meta name="geo.placename" content="South Florida" />
    <meta name="geo.position" content="25.7617;-80.1918" />
    <meta name="ICBM" content="25.7617, -80.1918" />

    <!--
      All JSON-LD structured data is emitted per page by React components
      (src/components/SEO/SchemaOrg.tsx app-wide; page Helmets for
      page-specific schemas like FAQPage and Article) and baked into the
      prerendered HTML by react-snap. Keep this template free of schema so
      pages never emit duplicates.
    -->
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-K3CKFM94');</script>
    <!-- End Google Tag Manager -->

    <!-- Meta Pixel + LinkedIn Insight + Instantly.ai — stubs install
         immediately (fbq/lintrk queue events fired before load); the
         third-party libraries themselves load on idle or first interaction,
         keeping them off the critical rendering path (Core Web Vitals). -->
    <script>
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
      n.push=n;n.loaded=!0;n.version='2.0';n.queue=[]}
      (window,document,'script');
      fbq('init','1342120122583302');

      _linkedin_partner_id="537660125";
      window._linkedin_data_partner_ids=window._linkedin_data_partner_ids||[];
      window._linkedin_data_partner_ids.push(_linkedin_partner_id);
      if(!window.lintrk){window.lintrk=function(a,b){window.lintrk.q.push([a,b])};window.lintrk.q=[];}

      (function(){
        var loaded=false;
        function add(src,attrs){var s=document.createElement('script');s.async=true;s.src=src;
          if(attrs){for(var k in attrs){s.setAttribute(k,attrs[k]);}}
          document.head.appendChild(s);}
        function loadPixels(){
          if(loaded)return;
          // Respect a prior "Decline" — don't load the third-party pixel
          // libraries (LinkedIn Insight auto-fires an impression on load).
          try{if(localStorage.getItem('hp_cookie_consent')==='declined'){return;}}catch(e){}
          loaded=true;
          add('https://connect.facebook.net/en_US/fbevents.js');
          add('https://snap.licdn.com/li.lms-analytics/insight.min.js');
          add('https://r2.leadsy.ai/tag.js',{id:'vtag-ai-js','data-pid':'avGlx7YMReNKhjgi','data-version':'062024'});
          window.removeEventListener('pointerdown',loadPixels);
          window.removeEventListener('keydown',loadPixels);
        }
        if('requestIdleCallback' in window){requestIdleCallback(loadPixels,{timeout:4000});}
        else{setTimeout(loadPixels,3500);}
        window.addEventListener('pointerdown',loadPixels,{once:true});
        window.addEventListener('keydown',loadPixels,{once:true});
      })();
    </script>
    <!-- End deferred pixels -->
  </head>
